<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#fff3e0"/>
  <!-- Headband -->
  <path d="M100 120 C100 60, 300 60, 300 120" stroke="#1a1a2e" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Padding -->
  <path d="M100 120 C100 60, 300 60, 300 120" stroke="#2d2d5e" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="10 6" opacity="0.3"/>
  <!-- Left ear cup -->
  <rect x="70" y="110" width="50" height="100" rx="16" fill="#1a1a2e"/>
  <rect x="78" y="118" width="34" height="84" rx="10" fill="#2d2d5e"/>
  <rect x="86" y="126" width="18" height="68" rx="6" fill="#16213e"/>
  <!-- Left ear cushion -->
  <rect x="66" y="115" width="58" height="10" rx="5" fill="#e8e4ff" opacity="0.6"/>
  <!-- Right ear cup -->
  <rect x="280" y="110" width="50" height="100" rx="16" fill="#1a1a2e"/>
  <rect x="288" y="118" width="34" height="84" rx="10" fill="#2d2d5e"/>
  <rect x="296" y="126" width="18" height="68" rx="6" fill="#16213e"/>
  <!-- Right ear cushion -->
  <rect x="276" y="115" width="58" height="10" rx="5" fill="#e8e4ff" opacity="0.6"/>
  <!-- Sound waves -->
  <path d="M160 160 L170 150 L170 170 L160 160Z" fill="#ff8a65" opacity="0.6"/>
  <path d="M155 155 L165 142 L165 178 L155 165Z" fill="#ff8a65" opacity="0.4"/>
  <path d="M150 150 L160 134 L160 186 L150 170Z" fill="#ff8a65" opacity="0.2"/>
  <path d="M240 160 L230 150 L230 170 L240 160Z" fill="#ff8a65" opacity="0.6"/>
  <path d="M245 155 L235 142 L235 178 L245 165Z" fill="#ff8a65" opacity="0.4"/>
  <path d="M250 150 L240 134 L240 186 L250 170Z" fill="#ff8a65" opacity="0.2"/>
</svg>
