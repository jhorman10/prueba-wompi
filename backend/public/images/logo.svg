<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <!-- Card body -->
  <rect x="148" y="190" width="216" height="152" rx="16" fill="#1e1b4b" opacity="0.9"/>
  <!-- Card chip -->
  <rect x="170" y="210" width="32" height="24" rx="4" fill="#fbbf24" opacity="0.9"/>
  <!-- Card wave lines -->
  <path d="M170 248 C180 238, 195 248, 210 238 C225 228, 240 248, 255 238" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M170 260 C185 250, 200 260, 215 250 C230 240, 245 260, 260 250" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <!-- Card number placeholder -->
  <rect x="170" y="278" width="140" height="8" rx="4" fill="#312e81"/>
  <!-- Card holder -->
  <rect x="170" y="296" width="80" height="6" rx="3" fill="#312e81"/>
  <rect x="260" y="296" width="50" height="6" rx="3" fill="#312e81"/>
  <!-- Checkmark circle overlay -->
  <circle cx="310" cy="300" r="50" fill="#059669"/>
  <circle cx="310" cy="300" r="42" fill="#10b981"/>
  <!-- Checkmark -->
  <path d="M292 300 L305 313 L330 286" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
