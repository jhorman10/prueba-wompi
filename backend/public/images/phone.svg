<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#ede5ff"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Phone body -->
  <rect x="140" y="20" width="120" height="260" rx="24" fill="url(#phoneBody)" stroke="#c7d2fe" stroke-width="1.5"/>
  <!-- Side buttons -->
  <rect x="136" y="70" width="4" height="20" rx="2" fill="#4338ca"/>
  <rect x="136" y="100" width="4" height="30" rx="2" fill="#4338ca"/>
  <rect x="260" y="80" width="4" height="40" rx="2" fill="#4338ca"/>
  <!-- Screen -->
  <rect x="154" y="46" width="92" height="200" rx="12" fill="url(#screenGrad)"/>
  <!-- Notch -->
  <rect x="180" y="46" width="40" height="20" rx="8" fill="#1e1b4b"/>
  <!-- Status bar -->
  <rect x="164" y="52" width="16" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
  <rect x="220" y="52" width="12" height="4" rx="2" fill="#a5b4fc" opacity="0.4"/>
  <!-- App UI content -->
  <rect x="164" y="78" width="72" height="6" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <rect x="164" y="90" width="40" height="4" rx="2" fill="#a5b4fc" opacity="0.5"/>
  <!-- Card preview -->
  <rect x="164" y="106" width="72" height="44" rx="6" fill="#6366f1" opacity="0.4"/>
  <rect x="172" y="116" width="30" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
  <rect x="172" y="126" width="20" height="3" rx="1.5" fill="#a5b4fc" opacity="0.4"/>
  <rect x="218" y="128" width="10" height="6" rx="3" fill="#fbbf24" opacity="0.8"/>
  <!-- Button -->
  <rect x="170" y="166" width="60" height="16" rx="8" fill="#7c3aed"/>
  <!-- Bottom nav -->
  <rect x="164" y="220" width="72" height="18" rx="4" fill="#1e1b4b"/>
  <rect x="172" y="225" width="12" height="4" rx="2" fill="#7c3aed"/>
  <rect x="192" y="225" width="12" height="4" rx="2" fill="#4338ca" opacity="0.5"/>
  <rect x="212" y="225" width="12" height="4" rx="2" fill="#4338ca" opacity="0.5"/>
</svg>
